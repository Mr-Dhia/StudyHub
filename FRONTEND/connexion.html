<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - StudyHub</title>
    <link rel="stylesheet" href="css/styleconn.css">
</head>
<body>

<header>
    <h1 class="logo">StudyHub</h1>
    <nav class="bar">
        <a href="index.html">Accueil</a>
        <a href="connexion.html" class="moi">Connexion</a>
        <a href="inscription.html">Inscription</a>
    </nav>
</header>

<div class="container">
    <div class="form-box">
        <h2>Se connecter</h2>

        <form id="myform">

            <div class="input-box">
                <input type="email"  id="email" placeholder=" " required>
                <label for="email">Email</label>
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder=" " required>
                <label for="password">Mot de passe</label>
            </div>

            <span id="erreur"></span>

            <button type="submit" class="btn">Connexion</button>
            <p class="forgot-link">
                <a href="forgot.html"> mot de passe oublié? </a>
            
            </p>
            <p class="login-link">
                Pas de compte ? <a href="inscription.html">S'inscrire</a>
            </p>

        </form>
    </div>
</div>

</body>
<script src="js/conn.js"></script>
</html>
