<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub — Travaux Pratiques</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tp.css">
</head>
<body>
    <header>
        <a href="dashboard.html" class="logo">Study<span>Hub</span></a>
        <div class="header-right">
            <div class="user-pill">
                <div class="avatar" id="user-avatar">AA</div>
                <span class="user-name" id="user-name">Ahmed Aouali</span>
            </div>
            <button id="logoutBtn" class="logout-link">Déconnexion →</button>
        </div>
    </header>

    <main>
        <div class="top-bar">
            <a href="dashboard.html" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Retour
            </a>
            <button class="upload-btn" id="uploadBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
                Ajouter un fichier
            </button>
        </div>

        <div class="page-header">
            <div class="page-tag">TP</div>
            <h1>Travaux <span>Pratiques</span></h1>
            <p>Rapports et sujets de TP — mets en pratique tes compétences avec des exercices concrets en laboratoire.</p>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Semestre</label>
                <select id="filter-semestre">
                    <option value="all">Tous les semestres</option>
                    <option value="S3">Semestre 3</option>
                    <option value="S4">Semestre 4</option>
                    <option value="S5">Semestre 5</option>
                    <option value="S6">Semestre 6</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Matière</label>
                <select id="filter-matiere">
                    <option value="all">Toutes les matières</option>
                    <option value="Algorithmique">Algorithmique</option>
                    <option value="BD">Bases de données</option>
                    <option value="POO">Programmation Orientée Objet</option>
                    <option value="Reseaux">Réseaux</option>
                    <option value="Web">Développement Web</option>
                </select>
            </div>
        </div>

        <div class="documents-grid" id="documents-grid"></div>
    </main>

    <footer>
        © 2026 StudyHub &nbsp;·&nbsp; Projet étudiant ISTIC
    </footer>

    <script src="js/tp.js"></script>
</body>
</html>
